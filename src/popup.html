<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 260px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 14px;
        color: #c9d1d9;
        background: #161b22;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      .header span {
        font-size: 18px;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
      }

      .section {
        border-top: 1px solid #30363d;
        padding-top: 12px;
        margin-top: 12px;
      }

      .section:first-of-type {
        border-top: none;
        padding-top: 0;
        margin-top: 0;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .status {
        font-size: 13px;
        color: #8b949e;
      }

      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #30363d;
        border-radius: 11px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        bottom: 3px;
        background: #c9d1d9;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      input:checked + .slider {
        background: #1f6feb;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
      }

      .user-list {
        margin-top: 10px;
        max-height: 200px;
        overflow-y: auto;
      }

      .user-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 13px;
      }

      .user-row label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #8b949e;
        flex: 1;
        min-width: 0;
      }

      .user-row label input {
        accent-color: #1f6feb;
        cursor: pointer;
      }

      .user-row .username {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .globe-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        padding: 2px 4px;
        border-radius: 4px;
        opacity: 0.4;
        transition: opacity 0.2s;
      }

      .globe-btn:hover {
        opacity: 0.7;
      }

      .globe-btn.active {
        opacity: 1;
      }

      .empty-msg {
        font-size: 12px;
        color: #484f58;
        padding: 8px 0;
      }

      .reload-banner {
        display: none;
        margin-top: 12px;
        padding: 8px 12px;
        background: #1c2128;
        border: 1px solid #f0883e;
        border-radius: 8px;
        font-size: 12px;
        color: #d29922;
        text-align: center;
      }

      .reload-banner span {
        display: block;
        margin-bottom: 6px;
      }

      .reload-btn {
        background: #f0883e;
        color: #161b22;
        border: none;
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .reload-btn:hover {
        background: #d29922;
      }

      .text-add-row {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }

      .text-input {
        flex: 1;
        min-width: 0;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 5px 8px;
        color: #c9d1d9;
        font-size: 12px;
        font-family: inherit;
      }

      .text-input::placeholder {
        color: #484f58;
      }

      .text-input:focus {
        outline: none;
        border-color: #1f6feb;
      }

      .text-add-btn {
        background: #1f6feb;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        flex-shrink: 0;
      }

      .text-add-btn:hover {
        background: #388bfd;
      }

      .text-error {
        display: none;
        margin-top: 6px;
        font-size: 11px;
        color: #f85149;
      }

      .text-list {
        margin-top: 10px;
        max-height: 200px;
        overflow-y: auto;
      }

      .text-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
        font-size: 13px;
        min-width: 0;
      }

      .text-row input[type='checkbox'] {
        accent-color: #1f6feb;
        cursor: pointer;
        flex-shrink: 0;
      }

      .text-pattern {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #8b949e;
      }

      .text-pattern.checked {
        color: #c9d1d9;
      }

      .text-pattern.regex {
        font-family: 'SF Mono', Menlo, Consolas, monospace;
        font-size: 12px;
        color: #d2a8ff;
      }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 13px;
        padding: 2px 4px;
        border-radius: 4px;
        color: #8b949e;
        opacity: 0.4;
        transition: opacity 0.2s;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        opacity: 0.8;
      }

      .icon-btn.active {
        opacity: 1;
      }

      .icon-btn.regex-btn.active {
        color: #d2a8ff;
      }

      .icon-btn.globe-btn.active {
        color: #79c0ff;
      }

      .icon-btn.delete-btn {
        color: #f85149;
        opacity: 0.5;
      }

      .icon-btn.delete-btn:hover {
        opacity: 1;
      }

      .section-hint {
        font-size: 11px;
        color: #6e7681;
        margin-top: 4px;
        line-height: 1.4;
      }

      .footer {
        border-top: 1px solid #30363d;
        padding-top: 10px;
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .footer-left {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .footer-left a {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #484f58;
        text-decoration: none;
        font-size: 11px;
      }

      .footer-left a:hover {
        color: #8b949e;
      }

      .footer-left a svg {
        flex-shrink: 0;
      }

      .footer-version {
        font-size: 11px;
        color: #6e7681;
      }

      .footer-gear {
        background: none;
        border: none;
        color: #484f58;
        font-size: 13px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }

      .footer-gear:hover {
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>🧹</span>
      <h1>PR Cleaner</h1>
    </div>

    <div class="section">
      <div class="row">
        <span class="status">Hide deploys: <span id="deploy-status">On</span></span>
        <label class="switch">
          <input type="checkbox" id="deploy-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="row">
        <span class="status">Hide comments: <span id="comments-status">Off</span></span>
        <label class="switch">
          <input type="checkbox" id="comments-toggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div id="user-list-container" class="user-list" style="display: none"></div>
      <div id="reload-banner" class="reload-banner">
        <span>Reload page to restore hidden comments</span>
        <button id="reload-btn" class="reload-btn">Reload</button>
      </div>
    </div>

    <div class="section">
      <div class="row">
        <span class="status">Workflows panel: <span id="workflows-status">Off</span></span>
        <label class="switch">
          <input type="checkbox" id="workflows-toggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="section-hint">
        Shows a panel above the comment box with links to each workflow run's summary.
      </div>
    </div>

    <div class="section">
      <div class="row">
        <span class="status">Hide by text: <span id="text-status">Off</span></span>
        <label class="switch">
          <input type="checkbox" id="text-toggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="section-hint">Only hides items from the PR timeline.</div>
      <div id="text-container" style="display: none">
        <div class="text-add-row">
          <input type="text" id="text-input" class="text-input" placeholder="+ Add pattern" />
          <button id="text-add-btn" class="text-add-btn">Add</button>
        </div>
        <div id="text-error" class="text-error"></div>
        <div id="text-list-container" class="text-list"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <a
          id="repo-link"
          href="https://github.com/thereis/github-pr-cleaner"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg height="14" width="14" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
          <span>PR Cleaner</span>
        </a>
        <span id="version" class="footer-version"></span>
      </div>
      <button id="settings-btn" class="footer-gear" title="Advanced settings">&#9881;</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
