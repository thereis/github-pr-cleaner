<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 14px;
        color: #c9d1d9;
        background: #161b22;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 14px;
      }

      .section {
        border-top: 1px solid #30363d;
        padding-top: 12px;
        margin-top: 12px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .status {
        font-size: 13px;
        color: #8b949e;
      }

      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #30363d;
        border-radius: 11px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        bottom: 3px;
        background: #c9d1d9;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      input:checked + .slider {
        background: #1f6feb;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Advanced Settings</h1>
    </div>

    <div class="section">
      <div class="section-title">Advanced</div>
      <div class="row">
        <span class="status">Enable debug logs</span>
        <label class="switch">
          <input type="checkbox" id="debug-toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
