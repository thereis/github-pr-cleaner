<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    background: #24292e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .popup-wrapper {
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .popup {
    width: 260px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: #c9d1d9;
    background: #161b22;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .header span { font-size: 18px; }
  .header h1 { font-size: 14px; font-weight: 600; margin: 0; }

  .section {
    border-top: 1px solid #30363d;
    padding-top: 12px;
    margin-top: 12px;
  }

  .section:first-of-type {
    border-top: none;
    padding-top: 0;
    margin-top: 0;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status {
    font-size: 13px;
    color: #8b949e;
  }

  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }

  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    bottom: 3px;
    background: #c9d1d9;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .slider.off { background: #30363d; }
  .slider.on { background: #1f6feb; }
  .slider.on::before { transform: translateX(18px); }

  .user-list {
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
  }

  .user-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }

  .user-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8b949e;
    flex: 1;
    min-width: 0;
  }

  .user-row label input {
    accent-color: #1f6feb;
  }

  .user-row .username {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .globe-btn {
    background: none;
    border: none;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
  }

  .globe-btn.inactive { opacity: 0.4; }
  .globe-btn.active { opacity: 1; }
</style>
</head>
<body>

<div class="popup-wrapper">
  <div class="popup">
    <div class="header">
      <span>🧹</span>
      <h1>PR Cleaner</h1>
    </div>

    <div class="section">
      <div class="row">
        <span class="status">Hide deploys: <span>On</span></span>
        <label class="switch">
          <input type="checkbox" checked />
          <span class="slider on"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="row">
        <span class="status">Hide comments: <span>On</span></span>
        <label class="switch">
          <input type="checkbox" checked />
          <span class="slider on"></span>
        </label>
      </div>

      <div class="user-list">
        <div class="user-row">
          <label>
            <input type="checkbox" checked />
            <span class="username">@ci-bot</span>
          </label>
          <button class="globe-btn active">🌐</button>
        </div>
        <div class="user-row">
          <label>
            <input type="checkbox" checked />
            <span class="username">@deploy-service</span>
          </label>
          <button class="globe-btn inactive">🌐</button>
        </div>
        <div class="user-row">
          <label>
            <input type="checkbox" />
            <span class="username">@sarah-reviewer</span>
          </label>
          <button class="globe-btn inactive">🌐</button>
        </div>
        <div class="user-row">
          <label>
            <input type="checkbox" />
            <span class="username">@code-quality-bot</span>
          </label>
          <button class="globe-btn inactive">🌐</button>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
